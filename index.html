<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PasteShare - Secure Sharing Platform</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body class="dark-theme">
    <header>
        <h1>PasteShare</h1>
        <button id="uploadButton">Upload</button>
    </header>

    <main>
        <section id="inputSection">
            <textarea id="textInput" placeholder="Paste your text here..."></textarea>
            <div id="imageUploadArea" ondrop="handleDrop(event)" ondragover="allowDrop(event)">
                <p>Drag and drop images here</p>
            </div>
        </section>

        <button id="shareModalButton">Share</button>

        <div id="toast" class="toast">Upload successful!</div>
    </main>

    <div id="shareModal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2>Share Your Paste</h2>
        <p>Your paste link will be generated here.</p>
    </div>

    <script>
        // JavaScript for handling uploads, modals, and notifications
        
        function allowDrop(ev) {
            ev.preventDefault();
        }

        function handleDrop(ev) {
            ev.preventDefault();
            const files = ev.dataTransfer.files;
            // Logic for handling the dropped images 
        }

        document.getElementById('uploadButton').addEventListener('click', function() {
            // Logic for uploading text and image
        });

        function closeModal() {
            document.getElementById('shareModal').style.display = "none";
        }
    </script>

    <style>
        /* CSS for dark theme and responsive design */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }
        header {
            text-align: center;
            padding: 20px;
        }
        #inputSection {
            margin: 20px;
        }
        textarea {
            width: 100%;
            height: 100px;
            margin-bottom: 20px;
        }
        #imageUploadArea {
            width: 100%;
            height: 200px;
            border: 2px dashed #ffffff;
            text-align: center;
            line-height: 200px;
            margin-bottom: 20px;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            padding-top: 100px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgb(0,0,0);
            background-color: rgba(0,0,0,0.4);
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #333;
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
    </style>
</body>
</html>
